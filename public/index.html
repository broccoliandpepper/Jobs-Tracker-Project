<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobTracker</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-theme="light">

  <header>
    <h1>📋 JobTracker</h1>
    <div class="header-actions">
  <span id="last-backup-label" class="backup-status backup-none">Aucun backup récent</span>
  <button id="backup-btn" class="btn-backup" title="Créer une copie horodatée de la base de données">💾 Backup DB</button>
</div>
<div class="ai-controls">
  <label class="toggle-container" title="Active l'analyse automatique des candidatures via Ollama local">
    <input type="checkbox" id="ai-toggle" title="Activer le scoring automatique et la détection fake via Ollama">
    <span class="toggle-label">IA Ollama</span>
  </label>
  <span id="ai-status-label" class="status-inactive">Inactif</span>
  <select id="ai-model-select" disabled>
    <option>Chargement...</option>
  </select>
  <button id="refresh-models-btn" class="btn-icon" title="Recharger les modèles">🔄</button>
</div>
<!-- n8n Webhook -->
<div class="settings-section">
  <div class="webhook-controls">
    <label class="toggle-label">
      <input type="checkbox" id="webhook-toggle" title="Activer la réception de candidatures depuis n8n">
      <span>n8n Webhook</span>
    </label>
    <span id="webhook-status-label" class="status-inactive">Inactif</span>

    <select id="n8n-mode-select" disabled>
      <option value="local">n8n Local</option>
      <option value="docker-mac">n8n Docker (macOS/Windows)</option>
      <option value="docker-linux">n8n Docker (Linux)</option>
      <option value="docker-custom">n8n Docker (Custom IP)</option>
    </select>
  </div>

  <!-- IP Custom (affiché uniquement si docker-custom) -->
  <div id="n8n-custom-ip-container" style="display:none; margin-top:0.5rem;">
    <label>IP Custom :
      <input type="text" id="n8n-custom-ip" placeholder="ex: 192.168.1.100">
    </label>
  </div>

  <!-- URL webhook + bouton copier -->
  <div id="webhook-url-box" class="webhook-url-box" style="display:none;">
    <label>URL à copier dans n8n :</label>
    <div class="url-display-row">
      <span id="webhook-url-display"></span>
      <button id="copy-webhook-url-btn" class="btn-secondary">📋 Copier</button>
    </div>
    <p id="webhook-context-note" class="context-note"></p>
  </div>

  <!-- Bouton test + résultat -->
  <div style="margin-top:0.5rem;">
    <button id="test-webhook-btn" title="Vérifier que l'endpoint JobTracker répond correctement" class="btn-secondary" style="display:none;">🧪 Tester la connexion</button>
    <span id="webhook-test-result"></span>
  </div>
</div>

    <button id="theme-toggle">🌙 Dark</button>
  </header>

  <main>
    <section id="stats-section"></section>

    <section id="filters-section">
      <input type="text" id="search-input" placeholder="🔍 Rechercher...">
      <select id="filter-status">
        <option value="">Tous les statuts</option>
        <option value="ToApply">ToApply</option>
        <option value="Applied">Applied</option>
        <option value="PhoneScreen">PhoneScreen</option>
        <option value="Interview">Interview</option>
        <option value="Offer">Offer</option>
        <option value="Rejected">Rejected</option>
        <option value="Withdrawn">Withdrawn</option>
      </select>
      <select id="filter-sector">
        <option value="">Tous les secteurs</option>
        <option value="IT">IT</option>
        <option value="Finance">Finance</option>
        <option value="Marketing">Marketing</option>
        <option value="RH">RH</option>
        <option value="Legal">Legal</option>
        <option value="Engineering">Engineering</option>
        <option value="Sales">Sales</option>
        <option value="Other">Other</option>
      </select>
      <select id="filter-remote">
        <option value="">Tous modes</option>
        <option value="Remote">Remote</option>
        <option value="Hybrid">Hybrid</option>
        <option value="On-site">On-site</option>
      </select>
      <select id="filter-fake">
        <option value="">Tous</option>
        <option value="0">Réels</option>
        <option value="1">Suspects</option>
      </select>
      <button id="btn-reset">↺ Reset</button>
      <button id="btn-export">⬇️ Export CSV</button>
      <button id="btn-import">⬆️ Import CSV</button>
<input type="file" id="import-file-input" accept=".csv" style="display:none">

    </section>

    <button id="btn-add-job">+ Ajouter une candidature</button>

    <table id="jobs-table">
      <thead>
        <tr>
          <th>Poste</th>
          <th>Entreprise</th>
          <th>Secteur</th>
          <th>Statut</th>
          <th>Remote</th>
          <th>Score</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="jobs-body"></tbody>
    </table>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h2 id="modal-title">Ajouter une candidature</h2>
      <form id="modal-form">
        <label>Poste *<input type="text" name="job_title" required></label>
        <label>Entreprise *<input type="text" name="company" required></label>
        <label>Statut *
          <select name="status" required>
            <option value="ToApply">ToApply</option>
            <option value="Applied">Applied</option>
            <option value="PhoneScreen">PhoneScreen</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
            <option value="Withdrawn">Withdrawn</option>
          </select>
        </label>
        <label>Secteur
          <select name="sector">
            <option value="">--</option>
            <option value="IT">IT</option>
            <option value="Finance">Finance</option>
            <option value="Marketing">Marketing</option>
            <option value="RH">RH</option>
            <option value="Legal">Legal</option>
            <option value="Engineering">Engineering</option>
            <option value="Sales">Sales</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label>Contrat
          <select name="contract_type">
            <option value="">--</option>
            <option value="CDI">CDI</option>
            <option value="CDD">CDD</option>
            <option value="Freelance">Freelance</option>
            <option value="Internship">Internship</option>
            <option value="Apprenticeship">Apprenticeship</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label>Remote
          <select name="remote">
            <option value="">--</option>
            <option value="Remote">Remote</option>
            <option value="Hybrid">Hybrid</option>
            <option value="On-site">On-site</option>
          </select>
        </label>
        <label>Localisation<input type="text" name="location"></label>
        <label>URL offre<input type="url" name="source_url"></label>
        <label>Plateforme
          <select name="source_platform">
            <option value="">--</option>
            <option value="LinkedIn">LinkedIn</option>
            <option value="Indeed">Indeed</option>
            <option value="Welcome to the Jungle">Welcome to the Jungle</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label>Salaire<input type="text" name="salary_range" placeholder="ex: 45-55k€"></label>
        <label>Fit Score (1-10)<input type="number" name="fit_score" min="1" max="10"></label>
        <label>Contact<input type="text" name="contact_name"></label>
        <label>Email contact<input type="email" name="contact_email"></label>
        <label>Notes<textarea name="notes" rows="3"></textarea></label>
        <label class="checkbox-label">
          <input type="checkbox" name="fake_flag"> Offre suspecte
        </label>
        <div id="modal-actions">
          <button type="submit" id="modal-submit">Enregistrer</button>
          <button type="button" id="modal-cancel">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/settings.js"></script>  <!-- ← ajouter cette ligne -->
</body>
</html>
